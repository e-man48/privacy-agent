name: build

# Baut die Doppelklick-Installer fuer Windows, macOS und Linux.
# Ausloeser: ein Versions-Tag (z.B. v0.1.0) oder manueller Start.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux-Systemabhaengigkeiten (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf build-essential \
            curl wget file libssl-dev

      - name: Python-Abhaengigkeiten
        run: pip install -r agent/requirements.txt

      - name: Python-Backend buendeln (PyInstaller-Sidecar)
        run: python build_sidecar.py

      - name: npm-Abhaengigkeiten
        run: npm install

      - name: Icons erzeugen
        run: npm run icons

      - name: Abhaengigkeits-Konflikt loesen (brotli / alloc-no-stdlib)
        working-directory: src-tauri
        run: |
          cargo generate-lockfile
          cargo update -p alloc-stdlib --precise 0.2.2
          cargo update -p alloc-no-stdlib --precise 2.0.4

      - name: Tauri-Installer bauen
        run: npm run build

      - name: Installer als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: privacy-agent-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
