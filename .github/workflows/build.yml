name: build

# Baut die Doppelklick-Installer fuer Windows, macOS und Linux.
# Ausloeser: ein Versions-Tag (z.B. v0.1.0) oder manueller Start.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Node einrichten
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: Rust-Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Linux-Systemabhaengigkeiten (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf build-essential \
            curl wget file libssl-dev

      - name: Python-Abhaengigkeiten
        run: pip install -r agent/requirements.txt

      - name: Python-Backend buendeln (PyInstaller-Sidecar)
        run: python build_sidecar.py

      - name: npm-Abhaengigkeiten
        run: npm install

      - name: Icons erzeugen
        run: npm run icons

      - name: Abhaengigkeits-Konflikt loesen (brotli / alloc-no-stdlib)
        working-directory: src-tauri
        run: |
          cargo generate-lockfile
          cargo update -p alloc-stdlib --precise 0.2.2
          cargo update -p alloc-no-stdlib --precise 2.0.4

      # --- Code-Signing (optional, aktiviert sich automatisch via Secrets) ---
      # Windows: PFX-Zertifikat in den Zertifikatsspeicher importieren, FALLS als
      # Secret hinterlegt. Ohne Secret bleibt der Build unsigniert (wie bisher).
      # Zum Aktivieren zusaetzlich in src-tauri/tauri.conf.json unter
      # bundle.windows den "certificateThumbprint" eintragen.
      - name: Windows-Zertifikat importieren (nur wenn hinterlegt)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            Write-Host "Kein Windows-Zertifikat hinterlegt -- Build bleibt unsigniert."
          } else {
            $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
            $pw = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
            Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
            Remove-Item $pfx
            Write-Host "Windows-Zertifikat importiert."
          }

      # macOS-Signing nur aktivieren, WENN ein Zertifikat hinterlegt ist.
      # (Leere APPLE_CERTIFICATE-Variable wuerde Tauri sonst zum Signieren mit
      # leerem Zertifikat verleiten -> Bundle-Fehler. Daher per GITHUB_ENV nur
      # bei vorhandenem Secret setzen.)
      - name: macOS-Signing vorbereiten (nur wenn hinterlegt)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            {
              echo "APPLE_CERTIFICATE<<__EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "macOS-Signing aktiviert."
          else
            echo "Kein Apple-Zertifikat -- macOS-Build bleibt unsigniert."
          fi

      - name: Tauri-Installer bauen
        run: npm run build

      - name: Installer als Artefakt hochladen
        uses: actions/upload-artifact@v6
        with:
          name: privacy-agent-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
